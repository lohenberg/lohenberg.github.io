    <script>
        const STORAGE_KEY = 'user-color-scheme'
        const defaultTheme = "dark"

        let currentTheme
        let switchButton
        let autoDefinedScheme = window.matchMedia('(prefers-color-scheme: dark)')

        function switchTheme(e) {
            currentTheme = (currentTheme === 'dark') ? 'light' : 'dark';
            if (localStorage) localStorage.setItem(STORAGE_KEY, currentTheme);
            document.documentElement.setAttribute('data-theme', currentTheme);
            changeGiscusTheme(currentTheme);
            document.body.dispatchEvent(new CustomEvent(currentTheme + "-theme-set"));
        }

        const autoChangeScheme = e => {
            currentTheme = e.matches ? 'dark' : 'light'
            document.documentElement.setAttribute('data-theme', currentTheme);
            changeGiscusTheme(currentTheme);
            document.body.dispatchEvent(new CustomEvent(currentTheme + "-theme-set"));
        }

        document.addEventListener('DOMContentLoaded', function () {
            switchButton = document.querySelector('#theme-toggle')
            currentTheme = detectCurrentScheme()

            if (currentTheme === 'auto') {
                autoChangeScheme(autoDefinedScheme);
                if (typeof autoDefinedScheme.addEventListener === 'function') {
                  autoDefinedScheme.addEventListener('change', autoChangeScheme);
                } else if (typeof autoDefinedScheme.addListener === 'function') { 
                  autoDefinedScheme.addListener(autoChangeScheme);
                }
            } else {
                document.documentElement.setAttribute('data-theme', currentTheme)
            }

            if (switchButton) {
                switchButton.addEventListener('click', switchTheme, false)
            }

            showContent();
        })

        function detectCurrentScheme() {
            if (localStorage !== null && localStorage.getItem(STORAGE_KEY)) {
                return localStorage.getItem(STORAGE_KEY)
            }
            if (defaultTheme) {
                return defaultTheme
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function showContent() {
            document.body.style.visibility = 'visible';
            document.body.style.opacity = 1;
        }

        function changeGiscusTheme (theme) {
            function sendMessage(message) {
              const iframe = document.querySelector('iframe.giscus-frame');
              if (!iframe) return;
              iframe.contentWindow.postMessage({ giscus: message }, 'https://giscus.app');
            }

            sendMessage({
              setConfig: {
                theme: theme
              }
            });
        }
    </script>

        playerReady = true;
        console.log('Player is ready');
      },
      onStateChange: onPlayerStateChange,
    },
    playerVars: {
      controls: 1,
      rel: 0
    },
  });
}

function extractVideoId(url) {
  const regex = /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([^\s&?#]+)/;
  const match = url.match(regex);
  return match ? match[1] : '';
}

function loadAndPlayVideo() {
  if (!playerReady) {
    alert('プレイヤーの読み込み中です。少々お待ちください。');
    return;
  }

  const url = document.getElementById('videoUrl').value.trim();
  const videoId = extractVideoId(url);

  const start = parseFloat(document.getElementById('startTime').value);
  const end = parseFloat(document.getElementById('endTime').value);

  const rate = parseFloat(document.getElementById('playbackRate').value) || 1;
  const loops = parseInt(document.getElementById('repeatCount').value) || 1;
  const volume = parseInt(document.getElementById('volume').value);

  if (!videoId) {
    alert('正しいYouTube動画URLを入力してください。');
    return;
  }

  startSeconds = isNaN(start) ? 0 : start;
  endSeconds = isNaN(end) ? 0 : end;

  totalLoops = loops;
  currentLoop = 0;

  isCustomRange = endSeconds > startSeconds;

  document.getElementById('replayBtn').style.display = 'none';

  if (playbackChecker) clearInterval(playbackChecker);

  document.getElementById('player-wrapper').style.visibility = 'visible';

  if (isCustomRange) {
    player.cueVideoById({
      videoId,
      startSeconds
    });

    waitForCued(() => {
      player.setPlaybackRate(rate);
      player.setVolume(volume);
      player.seekTo(startSeconds);
      player.playVideo();
    });

  } else {
    player.loadVideoById({ videoId });

    waitForPlaying(() => {
      player.setPlaybackRate(rate);
      player.setVolume(volume);
    });
  }
}

function waitForCued(callback) {
  const interval = setInterval(() => {
    if (player.getPlayerState() === YT.PlayerState.CUED) {
      clearInterval(interval);
      callback();
    }
  }, 100);
}

function waitForPlaying(callback) {
  const interval = setInterval(() => {
    const state = player.getPlayerState();

    if (
      state === YT.PlayerState.PLAYING ||
      state === YT.PlayerState.BUFFERING
    ) {
      clearInterval(interval);
      callback();
    }
  }, 100);
}

function replay() {
  currentLoop = 0;

  document.getElementById('replayBtn').style.display = 'none';
  document.getElementById('player-wrapper').style.display = 'block';

  player.seekTo(startSeconds);
  player.playVideo();
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING && isCustomRange) {

    if (playbackChecker) clearInterval(playbackChecker);

    playbackChecker = setInterval(() => {
      if (player.getCurrentTime() >= endSeconds) {

        currentLoop++;

        if (currentLoop < totalLoops) {
          player.seekTo(startSeconds);
          player.playVideo();

        } else {
          clearInterval(playbackChecker);
          player.pauseVideo();

          document.getElementById('replayBtn').style.display = 'block';
        }
      }
    }, 200);
  }
}

const volumeSlider = document.getElementById('volume');
const volumeValue = document.getElementById('volumeValue');

volumeSlider.addEventListener('input', () => {
  const val = parseInt(volumeSlider.value);

  volumeValue.textContent = val;

  if (playerReady && player) {
    player.setVolume(val);
  }
});
</script>
