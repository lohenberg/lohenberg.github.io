<style>

<div id="main-area">
  <div class="main-url">
    <label for="videoUrl">URL</label>
    <input type="text" id="videoUrl" placeholder="YouTubeの動画のURLを入力" />

    <input type="range" id="volume" min="0" max="100" value="50" />

  </div>

  <div id="playbtn-area">
    <button id="playBtn" onclick="loadAndPlayVideo()">再生</button>

    </select>

    <input type="number" id="repeatCount" placeholder="ループ回数" min="1" value="1" />
  </div>

<script>
if (!window.YT) {
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
}
</script>

<div id="player-area">
  <div id="player-wrapper">
    <div id="player"></div>
  </div>
</div>

<script>
let player;
let playerReady = false;
let startSeconds = 0;
let endSeconds = 0;
let totalLoops = 1;
let currentLoop = 0;
let isCustomRange = false;
let playbackChecker;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: '',
    events: {
      onReady: () => {
        playerReady = true;
        console.log('Player is ready');
      },
      onStateChange: onPlayerStateChange,
    },
    playerVars: {
      controls: 1,
      rel: 0
    },
  });
}

function extractVideoId(url) {
  const regex = /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([^\s&?#]+)/;
  const match = url.match(regex);
  return match ? match[1] : '';
}

function loadAndPlayVideo() {
  if (!playerReady) {
    alert('プレイヤーの読み込み中です。少々お待ちください。');
    return;
  }

  const url = document.getElementById('videoUrl').value.trim();
  const videoId = extractVideoId(url);

  const start = parseFloat(document.getElementById('startTime').value);
  const end = parseFloat(document.getElementById('endTime').value);

  const rate = parseFloat(document.getElementById('playbackRate').value) || 1;
  const loops = parseInt(document.getElementById('repeatCount').value) || 1;
  const volume = parseInt(document.getElementById('volume').value);

  if (!videoId) {
    alert('正しいYouTube動画URLを入力してください。');
    return;
  }

  startSeconds = isNaN(start) ? 0 : start;
  endSeconds = isNaN(end) ? 0 : end;

  totalLoops = loops;
  currentLoop = 0;

  isCustomRange = endSeconds > startSeconds;

  document.getElementById('replayBtn').style.display = 'none';

  if (playbackChecker) clearInterval(playbackChecker);

  document.getElementById('player-wrapper').style.visibility = 'visible';

  if (isCustomRange) {
    player.cueVideoById({
      videoId,
      startSeconds
    });

    waitForCued(() => {
      player.setPlaybackRate(rate);
      player.setVolume(volume);
      player.seekTo(startSeconds);
      player.playVideo();
    });

  } else {
    player.loadVideoById({ videoId });

    waitForPlaying(() => {
      player.setPlaybackRate(rate);
      player.setVolume(volume);
    });
  }
}

function waitForCued(callback) {
  const interval = setInterval(() => {
    if (player.getPlayerState() === YT.PlayerState.CUED) {
      clearInterval(interval);
      callback();
    }
  }, 100);
}

function waitForPlaying(callback) {
  const interval = setInterval(() => {
    const state = player.getPlayerState();

    if (
      state === YT.PlayerState.PLAYING ||
      state === YT.PlayerState.BUFFERING
    ) {
      clearInterval(interval);
      callback();
    }
  }, 100);
}

function replay() {
  currentLoop = 0;

  document.getElementById('replayBtn').style.display = 'none';
  document.getElementById('player-wrapper').style.display = 'block';

  player.seekTo(startSeconds);
  player.playVideo();
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING && isCustomRange) {

    if (playbackChecker) clearInterval(playbackChecker);

    playbackChecker = setInterval(() => {
      if (player.getCurrentTime() >= endSeconds) {

        currentLoop++;

        if (currentLoop < totalLoops) {
          player.seekTo(startSeconds);
          player.playVideo();

        } else {
          clearInterval(playbackChecker);
          player.pauseVideo();

          document.getElementById('replayBtn').style.display = 'block';
        }
      }
    }, 200);
  }
}

const volumeSlider = document.getElementById('volume');
const volumeValue = document.getElementById('volumeValue');

volumeSlider.addEventListener('input', () => {
  const val = parseInt(volumeSlider.value);

  volumeValue.textContent = val;

  if (playerReady && player) {
    player.setVolume(val);
  }
});
</script>
